# Render Blueprint for the Silvora backend (free tier).
# Files live on Cloudflare R2; this service only routes encrypted chunks, so
# the free instance is plenty for personal / small-beta use.
#
# After connecting the repo, set the R2_* and DATABASE_URL secrets in the
# Render dashboard (they are marked sync:false so they are NOT stored in git).
services:
  - type: web
    name: silvora-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate"
    startCommand: "gunicorn silvora_backend.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true        # Render generates a strong secret
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_SECURE
        value: "True"              # turns on HTTPS redirect, HSTS, secure cookies
      - key: PYTHON_VERSION
        value: "3.12.4"
      - key: DATABASE_URL
        sync: false                # paste a Postgres URL (Render free Postgres)
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false

  # Runs once a day: downgrades accounts whose 7-day cancellation grace
  # period elapsed, and permanently deletes files still over the Free
  # limit 30 days after cancellation. See billing/management/commands/
  # process_subscription_grace_periods.py for the actual logic.
  - type: cron
    name: silvora-grace-period-check
    runtime: python
    plan: free
    schedule: "0 3 * * *"  # 03:00 UTC daily — low-traffic hours
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py process_subscription_grace_periods"
    envVars:
      - fromService:
          type: web
          name: silvora-backend
          envVarKey: DJANGO_SECRET_KEY
        key: DJANGO_SECRET_KEY
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
